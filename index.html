<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<title>Habits</title>
<style>
  :root {
    --bg: #070707;
    --surface: #121212;
    --surface2: #1a1a1a;
    --surface3: #232323;
    --border: rgba(255,255,255,0.07);
    --text: #f3f3f3;
    --text-muted: rgba(255,255,255,0.38);
    --accent: #a78bfa;
    --accent2: #8b5cf6;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --radius: 18px;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 34px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .topbar {
    position: sticky; top: 0; z-index: 40;
    padding: calc(var(--safe-top) + 2px) 20px 16px;
    background: rgba(7,7,7,0.88);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  h1 { font-size: 28px; line-height: 1; letter-spacing: -0.6px; }
  .subdate { margin-top: 6px; font-size: 13px; color: var(--text-muted); }
  .btn-add {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 30% 30%, #bba4ff, var(--accent2));
    color: white; font-size: 28px; box-shadow: 0 8px 24px rgba(139,92,246,0.35);
    flex-shrink: 0;
  }
  .page { display: none; }
  .page.active { display: block; }
  .main-scroll { padding-bottom: calc(var(--safe-bottom) + 88px); }
  .section { margin: 16px; }
  .label {
    color: var(--text-muted); text-transform: uppercase; font-size: 11px;
    letter-spacing: 1px; font-weight: 700; margin-bottom: 10px;
  }
  .banner {
    margin: 16px; padding: 18px; border-radius: 20px;
    border: 1px solid rgba(167,139,250,0.18);
    background: linear-gradient(135deg, rgba(95,48,194,0.28), rgba(33,22,64,0.9));
    display: flex; gap: 14px; align-items: center;
  }
  .banner .icon { font-size: 28px; }
  .banner .num { font-size: 22px; font-weight: 800; color: #c4b5fd; }
  .banner .desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .banner-dots { margin-left: auto; display: flex; gap: 5px; }
  .banner-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .banner-dot.on { background: #bfa8ff; }
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .week-day { text-align: center; }
  .week-name { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .week-circle {
    width: 40px; height: 40px; margin: 0 auto; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid transparent;
    font-weight: 700; position: relative; cursor: pointer;
  }
  .week-circle.today { border-color: var(--accent); color: var(--accent); }
  .week-circle.selected { background: var(--accent); color: white; }
  .week-circle.done-mark::after {
    content: ''; position: absolute; bottom: 3px; width: 5px; height: 5px; border-radius: 50%; background: var(--green);
  }
  .row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .mini-progress { color: var(--text-muted); font-size: 14px; }
  .mini-progress b { color: var(--accent); }
  .progress-wrap { height: 3px; border-radius: 999px; overflow: hidden; background: var(--surface2); margin-bottom: 14px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), #c4b5fd); width: 0%; transition: width .35s ease; }
  .swipe-wrap {
    position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 10px;
  }
  .delete-layer {
    position: absolute; inset: 0; display: flex; justify-content: flex-end; align-items: stretch;
    pointer-events: none;
  }
  .delete-btn {
    width: 96px; border: none; background: linear-gradient(180deg, #ff8b8b, #ef4444); color: white;
    font-size: 14px; font-weight: 700; border-radius: var(--radius); margin-left: auto;
  }
  .habit-card {
    position: relative; z-index: 2; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 14px; display: flex; align-items: center; gap: 12px;
    transition: transform .25s ease, background .2s ease, border-color .2s ease;
    touch-action: pan-y;
  }
  .habit-card.done { background: rgba(16,84,62,0.34); border-color: rgba(52,211,153,0.18); }
  .habit-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px;
    background: var(--habit-color, var(--accent)); opacity: 0; transition: opacity .2s ease;
  }
  .habit-card.done::before { opacity: 1; }
  .emoji-box {
    width: 48px; height: 48px; border-radius: 14px; background: rgba(255,255,255,0.04);
    display: flex; align-items: center; justify-content: center; font-size: 25px; flex-shrink: 0;
  }
  .habit-content { flex: 1; min-width: 0; }
  .habit-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-meta { margin-top: 4px; font-size: 13px; color: var(--text-muted); }
  .habit-meta .streak { color: var(--yellow); font-weight: 700; margin-right: 6px; }
  .mini-week { display: flex; gap: 4px; margin-top: 7px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .dot.done { background: var(--green); }
  .dot.today-dot { background: var(--accent); opacity: 0.7; }
  .check-btn {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.12); font-size: 15px; font-weight: 800;
    color: transparent; transition: all .2s ease;
  }
  .habit-card.done .check-btn { background: var(--green); border-color: var(--green); color: white; }
  .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty .big { font-size: 44px; margin-bottom: 12px; }
  .stats-pad { padding: calc(var(--safe-top) + 58px) 0 calc(var(--safe-bottom) + 88px); }
  .stats-title { font-size: 28px; font-weight: 800; margin: 0 16px 16px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 16px 16px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px;
  }
  .stat-card .num { font-size: 28px; font-weight: 800; color: #c4b5fd; }
  .stat-card .txt { margin-top: 5px; color: var(--text-muted); font-size: 12px; }
  .chart-card {
    margin: 0 16px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px;
  }
  .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .bars { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; align-items: end; height: 150px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 8px; }
  .bar-wrap { width: 100%; height: 110px; display: flex; align-items: flex-end; }
  .bar {
    width: 100%; border-radius: 12px 12px 6px 6px; min-height: 8px;
    background: linear-gradient(180deg, #c4b5fd, var(--accent2));
  }
  .bar-num { font-size: 11px; color: var(--text-muted); }
  .bar-day { font-size: 11px; color: var(--text-muted); }
  .heatmap-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .heatmap { display: flex; gap: 4px; }
  .heat-col { display: flex; flex-direction: column; gap: 4px; }
  .heat-cell { width: 12px; height: 12px; border-radius: 4px; background: var(--surface3); }
  .heat-cell.l1 { background: rgba(167,139,250,.2); }
  .heat-cell.l2 { background: rgba(167,139,250,.45); }
  .heat-cell.l3 { background: rgba(167,139,250,.7); }
  .heat-cell.l4 { background: var(--accent); }
  .habit-stats-list { margin: 0 16px 16px; }
  .habit-stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 14px 16px; margin-bottom: 8px;
  }
  .habit-stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
  .habit-stat-name { font-size: 14px; font-weight: 700; }
  .habit-stat-pct { font-size: 14px; font-weight: 800; color: #c4b5fd; }
  .habit-stat-bar { height: 7px; border-radius: 999px; background: var(--surface3); overflow: hidden; }
  .habit-stat-fill { height: 100%; border-radius: 999px; }
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 16px calc(var(--safe-bottom) + 4px);
    background: rgba(7,7,7,0.88); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid var(--border);
  }
  .nav-btn { background: none; border: none; color: var(--text-muted); font: inherit; display: flex; flex-direction: column; gap: 4px; align-items: center; cursor: pointer; }
  .nav-btn .ic { font-size: 24px; }
  .nav-btn .tx { font-size: 11px; }
  .nav-btn.active { color: var(--accent); }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.65);
    display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .22s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%; background: #181818; border-radius: 24px 24px 0 0;
    padding: 18px 20px calc(var(--safe-bottom) + 20px);
    transform: translateY(100%); transition: transform .28s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; border-radius: 999px; background: rgba(255,255,255,.14); margin: 0 auto 18px; }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; }
  .input {
    width: 100%; border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    border-radius: 14px; padding: 14px 15px; font-size: 16px; margin-bottom: 16px; outline: none;
  }
  .input:focus { border-color: var(--accent); }
  .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 16px; }
  .emoji-btn {
    aspect-ratio: 1; border-radius: 14px; border: 2px solid transparent; cursor: pointer; background: var(--surface2); font-size: 22px;
  }
  .emoji-btn.selected { border-color: var(--accent); background: rgba(167,139,250,.15); }
  .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .color-btn { width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; }
  .color-btn.selected { border-color: white; transform: scale(1.08); }
  .btn-primary {
    width: 100%; border: none; border-radius: 15px; background: var(--accent); color: white;
    padding: 16px; font-size: 16px; font-weight: 800; cursor: pointer;
  }
  .legend-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; color: var(--text-muted); font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-chip { width: 10px; height: 10px; border-radius: 3px; }
  @keyframes confetti-fall { 0% { transform: translateY(-8px) rotate(0deg); opacity: 1; } 100% { transform: translateY(90px) rotate(360deg); opacity: 0; } }
  .confetti { position: fixed; width: 8px; height: 8px; border-radius: 2px; z-index: 999; animation: confetti-fall .8s ease-out forwards; pointer-events: none; }
</style>
</head>
<body>
  <div class="topbar">
    <div>
      <h1>Привычки</h1>
      <div class="subdate" id="dateLabel"></div>
    </div>
    <button class="btn-add" id="btnAdd">+</button>
  </div>

  <div class="page active main-scroll" id="pageMain">
    <div class="banner">
      <div class="icon">🔥</div>
      <div>
        <div class="num" id="streakNum">0</div>
        <div class="desc">дней подряд</div>
      </div>
      <div class="banner-dots" id="bannerDots"></div>
    </div>

    <div class="section">
      <div class="label">Неделя</div>
      <div class="week-grid" id="weekGrid"></div>
    </div>

    <div class="section">
      <div class="row-between">
        <div class="label" style="margin-bottom:0">Сегодня</div>
        <div class="mini-progress"><b id="doneCount">0</b> / <span id="totalCount">0</span></div>
      </div>
      <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
      <div id="habitList"></div>
    </div>
  </div>

  <div class="page" id="pageStats">
    <div class="stats-pad">
      <div class="stats-title">Статистика</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="num" id="statDays">0</div><div class="txt">Дней с приложением</div></div>
        <div class="stat-card"><div class="num" id="statBest">0</div><div class="txt">Лучшая серия</div></div>
        <div class="stat-card"><div class="num" id="statToday">0%</div><div class="txt">Сегодня выполнено</div></div>
        <div class="stat-card"><div class="num" id="statChecks">0</div><div class="txt">Всего отметок</div></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Выполнение за 7 дней</div>
        <div class="bars" id="weekBars"></div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Активность за 90 дней</div>
        <div class="heatmap-scroll"><div class="heatmap" id="heatmap"></div></div>
        <div class="legend-row">
          <div class="legend-item"><span class="legend-chip" style="background:#232323"></span>0</div>
          <div class="legend-item"><span class="legend-chip" style="background:rgba(167,139,250,.2)"></span>1</div>
          <div class="legend-item"><span class="legend-chip" style="background:rgba(167,139,250,.45)"></span>2</div>
          <div class="legend-item"><span class="legend-chip" style="background:rgba(167,139,250,.7)"></span>3</div>
          <div class="legend-item"><span class="legend-chip" style="background:#a78bfa"></span>max</div>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Топ привычек за 30 дней</div>
        <div class="habit-stats-list" id="habitStats"></div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" id="navMain" onclick="switchTab('main')"><div class="ic">◻️</div><div class="tx">Сегодня</div></button>
    <button class="nav-btn" id="navStats" onclick="switchTab('stats')"><div class="ic">📊</div><div class="tx">Статистика</div></button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Новая привычка</div>
      <label class="form-label">Название</label>
      <input class="input" id="habitInput" type="text" maxlength="40" placeholder="Например, вода">
      <label class="form-label">Эмодзи</label>
      <div class="emoji-grid" id="emojiGrid"></div>
      <label class="form-label">Цвет</label>
      <div class="color-row" id="colorRow"></div>
      <button class="btn-primary" id="saveBtn">Добавить привычку</button>
    </div>
  </div>

<script>
const EMOJIS = ['🏃','🧘','💧','📚','🥗','💪','🎯','✍️','🎸','🌅','🧠','💊','🚶','🛌','🎨','🧹','📱','🍎','☕','🫁','🧼','🧴','🧎'];
const COLORS = ['#a78bfa','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#fb923c','#2dd4bf'];
let habits = JSON.parse(localStorage.getItem('habits_v4') || '[]');
let completions = JSON.parse(localStorage.getItem('completions_v4') || '{}');
let selectedDate = todayStr();
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];

function todayStr(){ return new Date().toISOString().slice(0,10); }
function dateStr(d){ return d.toISOString().slice(0,10); }
function save(){ localStorage.setItem('habits_v4', JSON.stringify(habits)); localStorage.setItem('completions_v4', JSON.stringify(completions)); }
function isDone(hid, ds){ return !!(completions[ds] && completions[ds][hid]); }
function setDone(hid, ds, val){ if(!completions[ds]) completions[ds] = {}; completions[ds][hid] = val; save(); }
function monthRu(idx){ return ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'][idx]; }
function dayRu(idx){ return ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'][idx]; }
function shortDayRu(idx){ return ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][idx]; }
function updateDate(){ const d = new Date(); document.getElementById('dateLabel').textContent = `${dayRu(d.getDay())}, ${d.getDate()} ${monthRu(d.getMonth())}`; }

function streakAll(){
  if(!habits.length) return 0;
  let s = 0;
  for(let i=0;i<365;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = dateStr(d);
    if(habits.every(h => isDone(h.id, ds))) s++; else break;
  }
  return s;
}
function habitStreak(hid){
  let s = 0;
  for(let i=0;i<365;i++){
    const d = new Date(); d.setDate(d.getDate()-i);
    if(isDone(hid, dateStr(d))) s++; else break;
  }
  return s;
}

function renderBanner(){
  document.getElementById('streakNum').textContent = streakAll();
  const dots = document.getElementById('bannerDots');
  dots.innerHTML = '';
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = dateStr(d);
    const on = habits.length && habits.every(h => isDone(h.id, ds));
    const el = document.createElement('div');
    el.className = 'banner-dot' + (on ? ' on' : '');
    dots.appendChild(el);
  }
}

function renderWeek(){
  const root = document.getElementById('weekGrid');
  root.innerHTML = '';
  const now = new Date();
  for(let i=6;i>=0;i--){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const ds = dateStr(d);
    const wrap = document.createElement('div');
    wrap.className = 'week-day';
    const marked = habits.some(h => isDone(h.id, ds));
    wrap.innerHTML = `<div class="week-name">${shortDayRu(d.getDay())}</div><div class="week-circle ${ds===todayStr() ? 'today' : ''} ${ds===selectedDate ? 'selected' : ''} ${marked ? 'done-mark' : ''}">${d.getDate()}</div>`;
    wrap.querySelector('.week-circle').onclick = () => { selectedDate = ds; renderMain(); };
    root.appendChild(wrap);
  }
}

function miniWeek(hid){
  const now = new Date();
  let html = '';
  for(let i=6;i>=0;i--){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const ds = dateStr(d);
    html += `<div class="dot ${isDone(hid, ds) ? 'done' : ''} ${!isDone(hid, ds) && ds===todayStr() ? 'today-dot' : ''}"></div>`;
  }
  return html;
}

function spawnConfetti(node){
  const rect = node.getBoundingClientRect();
  const x = rect.left + rect.width/2;
  const y = rect.top + rect.height/2;
  const colors = ['#a78bfa','#34d399','#fbbf24','#60a5fa'];
  for(let i=0;i<8;i++){
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = `${x + (Math.random()-.5)*70}px`;
    p.style.top = `${y}px`;
    p.style.background = colors[i%4];
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 850);
  }
}

function clearDeleteTransforms(){
  document.querySelectorAll('.habit-card').forEach(el => el.style.transform = 'translateX(0px)');
}

function renderHabits(){
  const list = document.getElementById('habitList');
  list.innerHTML = '';
  const doneCount = habits.filter(h => isDone(h.id, selectedDate)).length;
  document.getElementById('doneCount').textContent = doneCount;
  document.getElementById('totalCount').textContent = habits.length;
  document.getElementById('progressFill').style.width = habits.length ? `${(doneCount/habits.length)*100}%` : '0%';
  if(!habits.length){
    list.innerHTML = '<div class="empty"><div class="big">✨</div><div>Добавь первую привычку через кнопку +</div></div>';
    return;
  }
  habits.forEach(h => {
    const done = isDone(h.id, selectedDate);
    const wrap = document.createElement('div');
    wrap.className = 'swipe-wrap';
    wrap.innerHTML = `
      <div class="delete-layer"><button class="delete-btn">🗑 Удалить</button></div>
      <div class="habit-card ${done ? 'done' : ''}" style="--habit-color:${h.color}">
        <div class="emoji-box">${h.emoji}</div>
        <div class="habit-content">
          <div class="habit-name">${h.name}</div>
          <div class="habit-meta">${habitStreak(h.id) ? `<span class="streak">🔥 ${habitStreak(h.id)}</span>` : ''}${done ? 'Выполнено ✓' : 'Не выполнено'}</div>
          <div class="mini-week">${miniWeek(h.id)}</div>
        </div>
        <div class="check-btn">✓</div>
      </div>`;
    const card = wrap.querySelector('.habit-card');
    const delBtn = wrap.querySelector('.delete-btn');

    let startX = 0, currentX = 0, moved = false;
    card.addEventListener('touchstart', e => {
      clearDeleteTransforms();
      startX = e.touches[0].clientX;
      currentX = 0;
      moved = false;
      card.style.transition = 'none';
    }, {passive:true});
    card.addEventListener('touchmove', e => {
      currentX = e.touches[0].clientX - startX;
      if(currentX < -6) moved = true;
      if(currentX < 0) card.style.transform = `translateX(${Math.max(currentX, -96)}px)`;
      if(currentX > 0) card.style.transform = 'translateX(0px)';
    }, {passive:true});
    card.addEventListener('touchend', () => {
      card.style.transition = 'transform .22s ease';
      if(currentX < -52) card.style.transform = 'translateX(-96px)';
      else card.style.transform = 'translateX(0px)';
    });
    card.addEventListener('click', e => {
      if(moved) return;
      if(delBtn.contains(e.target)) return;
      const newVal = !isDone(h.id, selectedDate);
      setDone(h.id, selectedDate, newVal);
      if(newVal && selectedDate === todayStr()) spawnConfetti(card);
      renderAll();
    });
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      habits = habits.filter(x => x.id !== h.id);
      Object.keys(completions).forEach(ds => { if(completions[ds]) delete completions[ds][h.id]; });
      save();
      renderAll();
    });
    list.appendChild(wrap);
  });
}

function weeklySeries(){
  const now = new Date();
  const data = [];
  for(let i=6;i>=0;i--){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const ds = dateStr(d);
    const count = habits.filter(h => isDone(h.id, ds)).length;
    data.push({day: shortDayRu(d.getDay()), val: count, date: ds});
  }
  return data;
}

function renderWeekBars(){
  const root = document.getElementById('weekBars');
  root.innerHTML = '';
  const data = weeklySeries();
  const max = Math.max(...data.map(x => x.val), 1);
  data.forEach(item => {
    const h = Math.max((item.val / max) * 100, item.val > 0 ? 10 : 8);
    const el = document.createElement('div');
    el.className = 'bar-col';
    el.innerHTML = `<div class="bar-num">${item.val}</div><div class="bar-wrap"><div class="bar" style="height:${h}%"></div></div><div class="bar-day">${item.day}</div>`;
    root.appendChild(el);
  });
}

function renderHeatmap(){
  const root = document.getElementById('heatmap');
  root.innerHTML = '';
  const now = new Date();
  for(let w=12; w>=0; w--){
    const col = document.createElement('div');
    col.className = 'heat-col';
    for(let d=6; d>=0; d--){
      const dt = new Date(now); dt.setDate(now.getDate() - (w*7 + d));
      const ds = dateStr(dt);
      const count = habits.filter(h => isDone(h.id, ds)).length;
      const max = habits.length || 1;
      const lvl = count === 0 ? 0 : count < max*0.33 ? 1 : count < max*0.66 ? 2 : count < max ? 3 : 4;
      const cell = document.createElement('div');
      cell.className = 'heat-cell' + (lvl ? ` l${lvl}` : '');
      col.appendChild(cell);
    }
    root.appendChild(col);
  }
}

function renderHabitStats(){
  const root = document.getElementById('habitStats');
  root.innerHTML = '';
  if(!habits.length){ root.innerHTML = '<div class="empty" style="padding:10px 0 0">Пока нет привычек</div>'; return; }
  const rows = habits.map(h => {
    let done30 = 0;
    for(let i=0;i<30;i++){
      const d = new Date(); d.setDate(d.getDate()-i);
      if(isDone(h.id, dateStr(d))) done30++;
    }
    return { ...h, pct: Math.round(done30 / 30 * 100) };
  }).sort((a,b)=>b.pct-a.pct);
  rows.forEach(h => {
    const el = document.createElement('div');
    el.className = 'habit-stat';
    el.innerHTML = `<div class="habit-stat-top"><div class="habit-stat-name">${h.emoji} ${h.name}</div><div class="habit-stat-pct">${h.pct}%</div></div><div class="habit-stat-bar"><div class="habit-stat-fill" style="width:${h.pct}%; background:${h.color}"></div></div>`;
    root.appendChild(el);
  });
}

function renderStats(){
  let first = null;
  habits.forEach(h => { if(!first || h.created < first) first = h.created; });
  const days = first ? Math.floor((Date.now() - new Date(first).getTime())/86400000)+1 : 0;
  let totalChecks = 0;
  Object.values(completions).forEach(day => Object.values(day || {}).forEach(v => { if(v) totalChecks++; }));
  let best = 0, cur = 0;
  for(let i=364;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = dateStr(d);
    const allDone = habits.length && habits.every(h => isDone(h.id, ds));
    if(allDone){ cur++; best = Math.max(best, cur); } else cur = 0;
  }
  const todayDone = habits.filter(h => isDone(h.id, todayStr())).length;
  document.getElementById('statDays').textContent = days;
  document.getElementById('statBest').textContent = best;
  document.getElementById('statToday').textContent = habits.length ? `${Math.round(todayDone/habits.length*100)}%` : '0%';
  document.getElementById('statChecks').textContent = totalChecks;
  renderWeekBars();
  renderHeatmap();
  renderHabitStats();
}

function renderMain(){ renderWeek(); renderBanner(); renderHabits(); }
function renderAll(){ updateDate(); renderMain(); renderStats(); }
function switchTab(tab){
  document.getElementById('pageMain').classList.toggle('active', tab==='main');
  document.getElementById('pageStats').classList.toggle('active', tab==='stats');
  document.getElementById('navMain').classList.toggle('active', tab==='main');
  document.getElementById('navStats').classList.toggle('active', tab==='stats');
}

function buildPickers(){
  const eg = document.getElementById('emojiGrid');
  eg.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e===selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => { selectedEmoji = e; buildPickers(); };
    eg.appendChild(btn);
  });
  const cr = document.getElementById('colorRow');
  cr.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (c===selectedColor ? ' selected' : '');
    btn.style.background = c;
    btn.onclick = () => { selectedColor = c; buildPickers(); };
    cr.appendChild(btn);
  });
}

document.getElementById('btnAdd').onclick = () => {
  document.getElementById('habitInput').value = '';
  selectedEmoji = EMOJIS[0];
  selectedColor = COLORS[0];
  buildPickers();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('habitInput').focus(), 250);
};
document.getElementById('modalOverlay').addEventListener('click', e => {
  if(e.target.id === 'modalOverlay') document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('saveBtn').onclick = () => {
  const name = document.getElementById('habitInput').value.trim();
  if(!name) return document.getElementById('habitInput').focus();
  habits.push({ id: Date.now().toString(), name, emoji: selectedEmoji, color: selectedColor, created: todayStr() });
  save();
  document.getElementById('modalOverlay').classList.remove('open');
  renderAll();
};

renderAll();
</script>
